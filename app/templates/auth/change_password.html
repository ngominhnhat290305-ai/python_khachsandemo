{% extends "base.html" %}
{% block title %}Đổi mật khẩu{% endblock %}
{% block page_title %}Đổi mật khẩu{% endblock %}
{% block breadcrumb %}Cập nhật mật khẩu đăng nhập{% endblock %}

{% block content %}
<div class="max-w-xl">
  <form method="POST" class="card">
    <div class="card-header">
      <h3 class="font-semibold text-espresso" style="font-family:var(--font-serif)">
        <i class="fas fa-key text-sienna mr-2"></i>Đổi mật khẩu
      </h3>
      <p class="text-xs text-mocha mt-1">Mật khẩu mới: ít nhất 8 ký tự, có chữ hoa và số.</p>
    </div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">Mật khẩu cũ <span class="required">*</span></label>
        <input type="password" name="old_password" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">Mật khẩu mới <span class="required">*</span></label>
        <input type="password" name="new_password" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">Xác nhận mật khẩu mới <span class="required">*</span></label>
        <input type="password" name="confirm_password" class="form-input" required>
      </div>
      <div class="flex gap-3">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> Lưu
        </button>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline">
          <i class="fas fa-times"></i> Huỷ
        </a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
